# Copy these values into environment variables or override them at runtime
# when launching the backend with the `postgres` profile.

spring.datasource.url=jdbc:postgresql://localhost:5432/rideshare
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
app.swagger.username=swagger-admin
app.swagger.password=change-me-swagger
