spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.h2.console.enabled=false

springdoc.api-docs.enabled=${APP_SWAGGER_ENABLED:false}
springdoc.swagger-ui.enabled=${APP_SWAGGER_ENABLED:false}
springdoc.swagger-ui.path=/swagger-ui.html
app.security.swagger-enabled=${APP_SWAGGER_ENABLED:false}

app.security.cors-allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGINS}
app.auth.public-admin-signup-enabled=${AUTH_PUBLIC_ADMIN_SIGNUP_ENABLED:false}
app.demo.seed-driver-queue=false