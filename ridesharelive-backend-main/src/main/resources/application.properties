spring.application.name=backend
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
spring.ai.openai-sdk.api-key=${OPENAI_API_KEY:test-key-for-local-profile}
spring.ai.openai-sdk.model=${OPENAI_MODEL:gpt-4o-mini}
spring.ai.model.chat=openai-sdk

app.jwt.secret=${APP_JWT_SECRET:}
app.jwt.access-expiration-ms=900000
app.jwt.refresh-expiration-ms=604800000
app.security.cors-allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
app.security.swagger-enabled=${APP_SWAGGER_ENABLED:true}

springdoc.swagger-ui.path=/swagger-ui.html

app.payment.stripe.secret-key=${STRIPE_SECRET_KEY:}
app.payment.stripe.currency=${STRIPE_CURRENCY:inr}
app.payment.stripe.success-url=${STRIPE_SUCCESS_URL:http://localhost:5173}
app.payment.stripe.cancel-url=${STRIPE_CANCEL_URL:http://localhost:5173}

spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_SMTP_STARTTLS_REQUIRED:false}
spring.mail.properties.mail.smtp.ssl.enable=${MAIL_SMTP_SSL_ENABLE:false}
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_SMTP_CONNECTION_TIMEOUT_MS:5000}
spring.mail.properties.mail.smtp.timeout=${MAIL_SMTP_TIMEOUT_MS:5000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_SMTP_WRITE_TIMEOUT_MS:5000}
app.mail.otp.enabled=${MAIL_OTP_ENABLED:false}
app.mail.otp.from-address=${MAIL_FROM_ADDRESS:}
app.mail.otp.from-name=${MAIL_FROM_NAME:RideShare Live}
app.mail.otp.skip-if-no-smtp-host=${MAIL_SKIP_IF_NO_SMTP_HOST:true}
app.auth.signup-otp.enabled=${AUTH_SIGNUP_OTP_ENABLED:true}
app.auth.signup-otp.ttl-seconds=${AUTH_SIGNUP_OTP_TTL_SECONDS:300}
app.auth.signup-otp.resend-delay-seconds=${AUTH_SIGNUP_OTP_RESEND_DELAY_SECONDS:30}
app.auth.signup-otp.expose-dev-otp=${AUTH_SIGNUP_OTP_EXPOSE_DEV_OTP:false}
