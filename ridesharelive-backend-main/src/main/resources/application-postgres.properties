spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/rideshare}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.h2.console.enabled=false
springdoc.api-docs.enabled=${APP_SWAGGER_ENABLED:false}
springdoc.swagger-ui.enabled=${APP_SWAGGER_ENABLED:false}
app.security.swagger-enabled=${APP_SWAGGER_ENABLED:false}
app.security.cors-allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGINS}
