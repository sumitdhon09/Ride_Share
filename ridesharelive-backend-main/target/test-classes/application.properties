spring.datasource.url=jdbc:h2:mem:rideshare-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.mail.host=localhost
spring.mail.port=1025
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
spring.autoconfigure.exclude=org.springframework.ai.model.openaisdk.autoconfigure.OpenAiSdkChatAutoConfiguration,org.springframework.ai.model.openaisdk.autoconfigure.OpenAiSdkEmbeddingAutoConfiguration,org.springframework.ai.model.openaisdk.autoconfigure.OpenAiSdkImageAutoConfiguration
app.security.swagger-enabled=false
app.security.cors-allowed-origin-patterns=http://localhost:5173
app.jwt.secret=test-jwt-secret-for-tests-1234567890
app.mail.otp.enabled=false
app.mail.otp.skip-if-no-smtp-host=true
